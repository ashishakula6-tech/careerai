services:
  # ===== Backend API =====
  - type: web
    name: careerai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: careerai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false                       # set after frontend deploys
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false                       # set in Render dashboard
      - key: SMTP_PASSWORD
        sync: false                       # set in Render dashboard
      - key: FROM_EMAIL
        sync: false                       # set in Render dashboard
      - key: COMPANY_NAME
        value: CareerAI
      - key: OPENAI_API_KEY
        sync: false                       # optional, set if using LLM
      - key: APP_BASE_URL
        sync: false                       # set to frontend URL after deploy
      - key: UPLOADS_DIR
        value: /tmp/uploads               # ephemeral on free tier (lost on redeploy). Upgrade to Starter for persistent disk.

  # ===== Frontend (Static Site — always free, no plan field needed) =====
  - type: web
    name: careerai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false                       # set to https://careerai-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ===== PostgreSQL Database (Free) =====
databases:
  - name: careerai-db
    databaseName: careerai
    user: careerai
    plan: free
    region: oregon
